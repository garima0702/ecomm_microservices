apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation
  namespace: ecommerce-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recommendation
  template:
    metadata:
      labels:
        app: recommendation
    spec:
      containers:
      - name: recommendation
        image: recommendation:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8056