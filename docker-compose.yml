version: '3.8'

services:

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: MicroservicesDB
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - ecomm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d MicroservicesDB"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka:
    build: ./Ecomm_EurekaServer
    container_name: eureka
    ports:
      - "8761:8761"
    restart: always
    networks:
      - ecomm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  config:
    build: ./Ecomm_ConfigServer
    container_name: config
    ports:
      - "8888:8888"
    restart: always
    networks:
      - ecomm-network
    depends_on:
      eureka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  gateway:
    build: ./APIGateway
    container_name: gateway
    ports:
      - "8081:8080"
    restart: always
    networks:
      - ecomm-network
    depends_on:
      config:
        condition: service_healthy
      eureka:
        condition: service_healthy

  product:
    build: ./Product
    container_name: product
    restart: always
    networks:
      - ecomm-network
    depends_on:
      postgres-db:
        condition: service_healthy
      config:
        condition: service_healthy
      eureka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/MicroservicesDB
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka

  catalog:
    build: ./ProductCatalog
    container_name: catalog
    restart: always
    networks:
      - ecomm-network
    depends_on:
      postgres-db:
        condition: service_healthy
      config:
        condition: service_healthy
      eureka:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/MicroservicesDB
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka

  inventory:
    build: ./ProductInventory
    container_name: inventory
    restart: always
    networks:
      - ecomm-network
    depends_on:
      postgres-db:
        condition: service_healthy
      config:
        condition: service_healthy
      eureka:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/MicroservicesDB
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka

  price:
    build: ./ProductPrice
    container_name: price
    restart: always
    networks:
      - ecomm-network
    depends_on:
      postgres-db:
        condition: service_healthy
      config:
        condition: service_healthy
      eureka:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/MicroservicesDB
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka

  cart:
    build: ./Cart
    container_name: cart
    ports:
      - "8082:8082"
    restart: always
    networks:
      - ecomm-network
    depends_on:
      config:
        condition: service_healthy
      eureka:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka

  recommendation:
    build: ./Recommendation
    container_name: recommendation
    ports:
      - "8083:8083"
    restart: always
    networks:
      - ecomm-network
    depends_on:
      config:
        condition: service_healthy
      eureka:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka

networks:
  ecomm-network:
    driver: bridge
