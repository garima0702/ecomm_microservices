version: '3.8'

services:

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: MicroservicesDB
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - ecomm-network

  eureka:
    build: ./Ecomm_EurekaServer
    container_name: eureka
    ports:
      - "8761:8761"
    restart: always
    networks:
      - ecomm-network

  config:
    build: ./Ecomm_ConfigServer
    container_name: config
    ports:
      - "8888:8888"
    depends_on:
      - eureka
    restart: always
    networks:
      - ecomm-network

  gateway:
    build: ./APIGateway
    container_name: gateway
    ports:
      - "8081:8080"
    depends_on:
      - config
      - eureka
    restart: always
    networks:
      - ecomm-network

  product:
    build: ./Product
    container_name: product
    depends_on:
      - config
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/MicroservicesDB
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    restart: always
    networks:
      - ecomm-network

  catalog:
    build: ./ProductCatalog
    container_name: catalog
    depends_on:
      - config
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/MicroservicesDB
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    restart: always
    networks:
      - ecomm-network

  inventory:
    build: ./ProductInventory
    container_name: inventory
    depends_on:
      - config
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/MicroservicesDB
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    restart: always
    networks:
      - ecomm-network

  price:
    build: ./ProductPrice
    container_name: price
    depends_on:
      - config
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/MicroservicesDB
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    restart: always
    networks:
      - ecomm-network

  cart:
    build: ./Cart
    container_name: cart
    ports:
      - "8082:8082"
    depends_on:
      - config
    restart: always
    networks:
      - ecomm-network

  recommendation:
    build: ./Recommendation
    container_name: recommendation
    ports:
      - "8083:8083"
    depends_on:
      - config
    restart: always
    networks:
      - ecomm-network


networks:
  ecomm-network:
    driver: bridge
